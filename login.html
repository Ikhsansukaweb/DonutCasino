<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DonutsMP Casino</title>
<style>
  /* Reset */
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0b123d;
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding-bottom: 60px; /* space for bottom nav */
  }

  header {
    background: #121a4c;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header .logo {
    display: flex;
    align-items: center;
  }
  header .logo img {
    width: 28px;
    height: 28px;
    margin-right: 10px;
  }
  header .logo span {
    font-weight: 700;
    font-size: 18px;
  }
  header .auth-buttons button {
    background: #121a4c;
    color: white;
    border: 1.5px solid white;
    border-radius: 6px;
    padding: 6px 12px;
    margin-left: 8px;
    font-weight: 700;
    cursor: pointer;
  }
  header .auth-buttons button.signup {
    background: #176fff;
    border-color: #176fff;
  }

  main {
    padding: 16px;
    flex: 1;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  main h1 {
    margin: 0 0 12px 0;
    font-weight: 700;
    font-size: 24px;
  }

  #searchGame {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    margin-bottom: 16px;
    outline: none;
  }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .game-card {
    background: #1b2465;
    border-radius: 12px;
    padding: 8px;
    position: relative;
    cursor: pointer;
    transition: box-shadow 0.3s ease;
  }
  .game-card:hover {
    box-shadow: 0 0 15px #247eff;
  }
  .game-card.new::before {
    content: "New";
    position: absolute;
    top: 8px;
    left: 8px;
    background: #247eff;
    padding: 2px 6px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    color: white;
  }
  .game-card img {
    width: 100%;
    height: 84px;
    border-radius: 8px;
    object-fit: contain;
    margin-bottom: 8px;
    user-select: none;
  }
  .game-name {
    font-weight: 700;
    font-size: 14px;
    line-height: 1;
    margin-bottom: 4px;
    user-select: none;
  }
  .game-provider {
    font-size: 11.5px;
    font-weight: 600;
    color: #9db5ff;
    user-select: none;
  }

  nav.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #121a4c;
    border-top: 1px solid #253095;
    display: flex;
    justify-content: space-around;
    padding: 8px 0 12px 0;
    z-index: 9999;
  }
  nav.bottom-nav .nav-item {
    color: #6c75be;
    font-size: 10.5px;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-grow: 1;
    cursor: pointer;
    user-select: none;
  }
  nav.bottom-nav .nav-item.active {
    color: #176fff;
    font-weight: 700;
  }
  nav.bottom-nav .nav-item span.icon {
    font-size: 20px;
  }

  @media (min-width: 600px) {
    main {
      padding: 24px 32px;
    }
    .game-grid {
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/2838/2838751.png" alt="Logo" />
    <span>BetDice</span>
  </div>
  <div class="auth-buttons">
    <button id="btnLogin">Masuk</button>
    <button class="signup" id="btnRegister">Daftar</button>
  </div>
</header>

<main>
  <h1>BetDice Originals</h1>
  <input type="search" id="searchGame" placeholder="Cari Permainan..." />

  <div class="game-grid" id="gameGrid">
    <!-- Game cards akan diisi menggunakan JS -->
  </div>
</main>

<nav class="bottom-nav">
  <div class="nav-item active" data-target="jelajah"><span class="icon">🔍</span>Jelajah</div>
  <div class="nav-item" data-target="beranda"><span class="icon">🏠</span>Beranda</div>
  <div class="nav-item" data-target="dompet"><span class="icon">👛</span>Dompet</div>
  <div class="nav-item" data-target="obrolan"><span class="icon">💬</span>Obrolan</div>
</nav>

<script>
  const games = [
    {
      id: 1,
      name: "HILO",
      provider: "BetDice",
      img: "https://cdn-icons-png.flaticon.com/512/1923/1923268.png",
      isNew: true
    },
    {
      id: 2,
      name: "CASE BATTLES",
      provider: "GrowDice",
      img: "https://cdn-icons-png.flaticon.com/512/4740/4740472.png",
      isNew: false
    },
    {
      id: 3,
      name: "CASES",
      provider: "GrowDice",
      img: "https://cdn-icons-png.flaticon.com/512/4413/4413698.png",
      isNew: false
    },
    {
      id: 4,
      name: "REME",
      provider: "GrowDice",
      img: "https://cdn-icons-png.flaticon.com/512/4061/4061675.png",
      isNew: false
    },
    {
      id: 5,
      name: "WHEEL",
      provider: "GrowDice",
      img: "https://cdn-icons-png.flaticon.com/512/1089/1089556.png",
      isNew: false
    },
    {
      id: 6,
      name: "MINES",
      provider: "GrowDice",
      img: "https://cdn-icons-png.flaticon.com/512/658/658735.png",
      isNew: false
    },
    {
      id: 7,
      name: "GAME 7",
      provider: "GrowDice",
      img: "https://cdn-icons-png.flaticon.com/512/1046/1046784.png",
      isNew: false
    },
    {
      id: 8,
      name: "GAME 8",
      provider: "GrowDice",
      img: "https://cdn-icons-png.flaticon.com/512/609/609803.png",
      isNew: false
    },
    {
      id: 9,
      name: "GAME 9",
      provider: "GrowDice",
      img: "https://cdn-icons-png.flaticon.com/512/2965/2965567.png",
      isNew: false
    }
  ];

  const gameGrid = document.getElementById('gameGrid');
  const searchGame = document.getElementById('searchGame');

  function renderGames(filter = '') {
    gameGrid.innerHTML = '';
    const filtered = games.filter(g =>
      g.name.toLowerCase().includes(filter.toLowerCase())
    );

    filtered.forEach(game => {
      const card = document.createElement('div');
      card.className = 'game-card' + (game.isNew ? ' new' : '');
      card.innerHTML = `
        <img src="${game.img}" alt="${game.name}" loading="lazy" />
        <div class="game-name">${game.name}</div>
        <div class="game-provider">${game.provider}</div>
      `;
      gameGrid.appendChild(card);
    });
  }

  searchGame.addEventListener('input', e => {
    renderGames(e.target.value);
  });

  renderGames();

  // Navbar active toggle simulation — for demo only
  const navItems = document.querySelectorAll('.bottom-nav .nav-item');
  navItems.forEach(item => {
    item.addEventListener('click', () => {
      navItems.forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      alert(`Mode "${item.textContent}" belum tersedia, ini demo saja.`);
    });
  });

  // Buttons Masuk / Daftar - hanya demo alert untuk ilustrasi
  document.getElementById('btnLogin').onclick = () => alert('Fungsi Masuk belum tersedia pada demo HTML ini.');
  document.getElementById('btnRegister').onclick = () => alert('Fungsi Daftar belum tersedia pada demo HTML ini.');
</script>

</body>
                                                  </html>
