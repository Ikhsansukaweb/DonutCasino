<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Donut Casino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="logo">🍩 DONUT<span>CASINO</span></div>
        <h2>Selamat Datang</h2>
        <p>Masukan Username Minecraft kamu</p>
        
        <div class="input-group">
            <input type="text" id="login-user" placeholder="Username Minecraft" required>
        </div>
        <div class="input-group">
            <input type="password" id="login-pass" placeholder="Password" required>
        </div>
        <button onclick="handleLogin()" id="btn-login">MASUK SEKARANG</button>
        <p class="footer-text">Belum punya akun? Bayar .pay di game untuk daftar!</p>
    </div>

    <script src="script.js"></script>
</body>
          </html>
