<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donut AI | Premium Chat</title>
    <style>
        :root {
            --bg-dark: #0e1117;
            --sidebar-bg: #1d2333;
            --bubble-user: #2b3a55;
            --bubble-ai: #1a1d23;
            --accent: #00e701;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            padding: 15px 20px;
            background: rgba(14, 17, 23, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo-text { font-weight: 700; letter-spacing: 1px; }
        .logo-text span { color: var(--accent); }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 85%;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; }
        .ai { align-self: flex-start; }

        .content {
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 15px;
            white-space: pre-wrap;
        }

        .user .content { background-color: var(--bubble-user); border-bottom-right-radius: 4px; color: #fff; }
        .ai .content { background-color: var(--bubble-ai); border-bottom-left-radius: 4px; border: 1px solid #30363d; }

        .sender-name { font-size: 11px; margin-bottom: 5px; color: var(--text-dim); text-transform: uppercase; }

        .input-container { padding: 20px; background: var(--bg-dark); }
        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background: #21262d;
            border-radius: 25px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            border: 1px solid #30363d;
        }

        input { flex: 1; background: none; border: none; color: white; padding: 12px; font-size: 15px; outline: none; }

        .send-btn {
            background: var(--accent);
            color: black;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .typing { font-size: 12px; color: var(--accent); margin-bottom: 8px; display: none; text-align: center; }
    </style>
</head>
<body>

<div class="main-chat">
    <header>
        <div class="logo-text">🍩 DONUT<span>AI</span></div>
        <div id="status" style="font-size: 12px; color: var(--accent);">● Online</div>
    </header>

    <div id="chat-window"></div>

    <div class="input-container">
        <div id="typing-indicator" class="typing">Donut AI sedang berpikir...</div>
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Tanya sesuatu..." autocomplete="off">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const GROQ_API_KEY = "Gsk_H7hwzFPgyxuAmpbC3Ih0WGdyb3FY8wVPJlELiU8sykzPLHQKkEJV";
    const SUPABASE_URL = "https://alpiwaraxijqguwunroa.supabase.co/rest/v1";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFscGl3YXJheGlqcWd1d3Vucm9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjY2MjMsImV4cCI6MjA4OTQwMjYyM30.WBaZGe4bEOcKdUXHEUe9nCtgfGO_ego6j0IfTcpiPY0";
    
    const username = localStorage.getItem('userIGN') || "Tuan Derr";
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('userInput');
    const typingIndicator = document.getElementById('typing-indicator');

    async function loadHistory() {
        try {
            const res = await fetch(`${SUPABASE_URL}/chat_history?username=eq.${username}&order=created_at.asc`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const data = await res.json();
            data.forEach(msg => addBubble(msg.message, msg.role));
        } catch (e) { console.error("Gagal muat history"); }
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        userInput.value = "";
        addBubble(text, 'user');
        await saveToDB(text, 'user');
        
        typingIndicator.style.display = "block";

        try {
            // Gunakan Proxy untuk menghindari blokir CORS
            const response = await fetch("https://corsproxy.io/?" + encodeURIComponent("https://api.groq.com/openai/v1/chat/completions"), {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "user", content: text }]
                })
            });

            const data = await response.json();
            const aiText = data.choices[0].message.content;

            addBubble(aiText, 'ai');
            await saveToDB(aiText, 'ai');
        } catch (err) {
            addBubble("Koneksi gagal! Coba lagi nanti, Tuan.", 'ai');
        } finally {
            typingIndicator.style.display = "none";
        }
    }

    async function saveToDB(msg, role) {
        try {
            await fetch(`${SUPABASE_URL}/chat_history`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username: username, message: msg, role: role })
            });
        } catch (e) { console.error("Gagal simpan ke DB"); }
    }

    function addBubble(text, role) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.innerHTML = `
            <span class="sender-name">${role === 'user' ? username : "Donut AI"}</span>
            <div class="content">${text}</div>
        `;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
    loadHistory();
</script>
</body>
</html>
