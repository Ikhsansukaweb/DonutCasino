<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donut AI | Tuan Derr</title>
    <style>
        :root {
            --bg: #0f1923;
            --card: #1a242d;
            --accent: #00e701;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        header {
            background: var(--card);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            font-weight: bold;
        }

        /* Chat Box */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
        }

        .user {
            align-self: flex-end;
            background: var(--accent);
            color: black;
            border-bottom-right-radius: 2px;
        }

        .ai {
            align-self: flex-start;
            background: var(--card);
            border-bottom-left-radius: 2px;
            border: 1px solid #2a3744;
        }

        /* Input Area */
        .input-area {
            background: var(--card);
            padding: 15px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #0d131a;
            border: 1px solid #2a3744;
            color: white;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        button {
            background: var(--accent);
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled { background: #555; }
    </style>
</head>
<body>

<header>🍩 DONUT AI CHAT</header>

<div id="chat-container">
    </div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Tanya sesuatu..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()" id="sendBtn">KIRIM</button>
</div>

<script>
    // KONFIGURASI (Ganti API_KEY_GEMINI dengan kunci dari Google AI Studio)
    const GEMINI_API_KEY = "AIzaSyDYmOLa90zmmxfP8hAGhgebimfHjX-tZJg";
    const SUPABASE_URL = "https://alpiwaraxijqguwunroa.supabase.co/rest/v1";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFscGl3YXJheGlqcWd1d3Vucm9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjY2MjMsImV4cCI6MjA4OTQwMjYyM30.WBaZGe4bEOcKdUXHEUe9nCtgfGO_ego6j0IfTcpiPY0";
    
    // Ambil username dari login sebelumnya
    const username = localStorage.getItem('userIGN') || "Guest";

    const chatContainer = document.getElementById('chat-container');

    // 1. Fungsi Load History dari Supabase saat buka web
    async function loadHistory() {
        try {
            const res = await fetch(`${SUPABASE_URL}/chat_history?username=eq.${username}&order=created_at.asc`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const data = await res.json();
            data.forEach(chat => addBubble(chat.message, chat.role));
        } catch (e) { console.error("Gagal muat riwayat"); }
    }

    // 2. Fungsi Kirim Pesan
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const text = input.value.trim();
        
        if (!text) return;

        input.value = "";
        btn.disabled = true;

        // Tampilkan & Simpan chat User
        addBubble(text, 'user');
        await saveToDB(text, 'user');

        try {
            // Panggil AI Gemini
            const aiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const aiData = await aiRes.json();
            const aiText = aiData.candidates[0].content.parts[0].text;

            // Tampilkan & Simpan chat AI
            addBubble(aiText, 'ai');
            await saveToDB(aiText, 'ai');
        } catch (err) {
            addBubble("Waduh, AI-nya lagi pusing. Coba lagi nanti!", 'ai');
        } finally {
            btn.disabled = false;
        }
    }

    // 3. Fungsi Simpan ke Database
    async function saveToDB(msg, role) {
        await fetch(`${SUPABASE_URL}/chat_history`, {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify({ username: username, message: msg, role: role })
        });
    }

    // 4. Fungsi Tambah Bubble Chat ke Layar
    function addBubble(text, role) {
        const div = document.createElement('div');
        div.className = `bubble ${role}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Jalankan load riwayat saat pertama buka
    loadHistory();
</script>

</body>
  </html>
