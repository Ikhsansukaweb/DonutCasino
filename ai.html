<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donut AI | Premium</title>
    <style>
        :root {
            --bg: #0e1117;
            --card: #1c2128;
            --accent: #00e701;
            --text: #adbac7;
            --user-bubble: #2b3a55;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; }

        header {
            padding: 15px 20px;
            background: var(--card);
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-weight: 800; font-size: 1.2rem; color: var(--accent); letter-spacing: 1px; }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg { max-width: 85%; line-height: 1.6; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; }
        .ai { align-self: flex-start; }

        .bubble {
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 15px;
        }

        .user .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; }
        .ai .bubble { background: var(--card); border: 1px solid #30363d; border-bottom-left-radius: 4px; }

        .name { font-size: 11px; color: var(--text); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }

        .input-area { padding: 20px; background: var(--bg); }
        .wrapper {
            max-width: 800px; margin: 0 auto;
            background: #22272e;
            border-radius: 30px;
            padding: 5px 10px;
            display: flex;
            border: 1px solid #444c56;
        }

        input { flex: 1; background: none; border: none; color: white; padding: 12px; outline: none; font-size: 15px; }
        button {
            background: var(--accent); color: #000; border: none;
            width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .typing { font-size: 12px; color: var(--accent); text-align: center; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">🍩 DONUT AI</div>
    <div style="font-size: 10px; color: #8b949e;">Status: <span style="color:var(--accent)">Active</span></div>
</header>

<div id="chat-window"></div>

<div class="input-area">
    <div id="status-text" class="typing">Donut AI sedang mengetik...</div>
    <div class="wrapper">
        <input type="text" id="userInput" placeholder="Tanya sesuatu..." autocomplete="off">
        <button onclick="sendMessage()" id="sendBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

<script>
    // 1. MASUKKAN TOKEN HF KAMU DI SINI
    const HF_TOKEN = "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"; 
    
    const SUPABASE_URL = "https://alpiwaraxijqguwunroa.supabase.co/rest/v1";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFscGl3YXJheGlqcWd1d3Vucm9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjY2MjMsImV4cCI6MjA4OTQwMjYyM30.WBaZGe4bEOcKdUXHEUe9nCtgfGO_ego6j0IfTcpiPY0";
    
    const username = localStorage.getItem('userIGN') || "Tuan Derr";
    const chatWindow = document.getElementById('chat-window');

    async function loadHistory() {
        try {
            const res = await fetch(`${SUPABASE_URL}/chat_history?username=eq.${username}&order=created_at.asc`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const data = await res.json();
            data.forEach(m => addBubble(m.message, m.role));
        } catch (e) {}
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        input.value = "";
        addBubble(text, 'user');
        await saveToDB(text, 'user');
        document.getElementById('status-text').style.display = "block";

        try {
            const response = await fetch("https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct", {
                method: "POST",
                headers: { "Authorization": `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: text })
            });

            const data = await response.json();
            let aiText = data[0].generated_text || data.generated_text;
            
            // Bersihkan teks kalau AI-nya ngulang chat kita
            if (aiText.includes(text)) {
                aiText = aiText.split(text).pop().trim();
            }

            addBubble(aiText, 'ai');
            await saveToDB(aiText, 'ai');
        } catch (err) {
            addBubble("Waduh, koneksi ke otak AI terputus. Coba lagi ya!", "ai");
        } finally {
            document.getElementById('status-text').style.display = "none";
        }
    }

    async function saveToDB(msg, role) {
        await fetch(`${SUPABASE_URL}/chat_history`, {
            method: 'POST',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username, message: msg, role: role })
        });
    }

    function addBubble(text, role) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${role}`;
        msgDiv.innerHTML = `<div class="name">${role === 'user' ? username : 'Donut AI'}</div><div class="bubble">${text}</div>`;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });
    loadHistory();
</script>
</body>
</html>
