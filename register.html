<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login & Register DonutsMP Casino</title>
<style>
  body {
    margin: 0; padding: 0;
    background: #0b123d;
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  #container {
    background: #121a4c;
    padding: 24px 32px;
    border-radius: 16px;
    max-width: 400px;
    width: 100%;
  }
  h1 {
    margin-bottom: 24px;
    font-weight: 700;
    font-size: 28px;
    text-align: center;
  }
  label {
    display: block;
    margin-top: 12px;
    font-weight: 600;
    font-size: 14px;
  }
  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 6px;
    font-size: 16px;
  }
  button {
    width: 100%;
    margin-top: 18px;
    padding: 14px;
    font-size: 18px;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    color: white;
    background: #176fff;
    transition: background 0.3s ease;
  }
  button:hover:not(:disabled) {
    background: #0d4fff;
  }
  button:disabled {
    background: #5791ff88;
    cursor: default;
  }
  .toggle-btns {
    display: flex;
    justify-content: center;
    margin-top: 20px;
  }
  .toggle-btns button {
    width: auto;
    margin: 0 8px;
    padding: 8px 16px;
    font-size: 14px;
    background: transparent;
    border: 2px solid white;
    border-radius: 10px;
    color: white;
    font-weight: 700;
  }
  .toggle-btns button.active {
    background: white;
    color: #176fff;
    border-color: white;
  }
  #message {
    margin-top: 14px;
    min-height: 20px;
    color: #ff6666;
    font-weight: 600;
    text-align: center;
  }
  #successMsg {
    color: #7cff7c;
  }
</style>
</head>
<body>

<div id="container">
  <h1 id="formTitle">Masuk</h1>

  <label for="emailInput">Email</label>
  <input type="email" id="emailInput" placeholder="email@example.com" required />

  <label for="passwordInput">Password</label>
  <input type="password" id="passwordInput" placeholder="********" required />

  <button id="submitBtn">Masuk</button>

  <div id="message"></div>

  <div class="toggle-btns">
    <button id="btnLogin" class="active">Masuk</button>
    <button id="btnRegister">Daftar</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
<script>
  // Supabase config
  const SUPABASE_URL = 'https://alpiwaraxijqguwunroa.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFscGl3YXJheGlqcWd1d3Vucm9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjY2MjMsImV4cCI6MjA4OTQwMjYyM30.WBaZGe4bEOcKdUXHEUe9nCtgfGO_ego6j0IfTcpiPY0';
  const supabase = supabase_js.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const formTitle = document.getElementById('formTitle');
  const emailInput = document.getElementById('emailInput');
  const passwordInput = document.getElementById('passwordInput');
  const submitBtn = document.getElementById('submitBtn');
  const messageDiv = document.getElementById('message');

  const btnLoginToggle = document.getElementById('btnLogin');
  const btnRegisterToggle = document.getElementById('btnRegister');

  let mode = 'login'; // or 'register'

  btnLoginToggle.onclick = () => {
    mode = 'login';
    formTitle.textContent = 'Masuk';
    submitBtn.textContent = 'Masuk';
    messageDiv.textContent = '';
    btnLoginToggle.classList.add('active');
    btnRegisterToggle.classList.remove('active');
  };
  btnRegisterToggle.onclick = () => {
    mode = 'register';
    formTitle.textContent = 'Daftar';
    submitBtn.textContent = 'Daftar';
    messageDiv.textContent = '';
    btnRegisterToggle.classList.add('active');
    btnLoginToggle.classList.remove('active');
  };

  submitBtn.onclick = async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    if(!email || !password) {
      messageDiv.textContent = "Isi email dan password dengan benar.";
      return;
    }

    messageDiv.style.color = '#fff';
    messageDiv.textContent = 'Processing...';
    submitBtn.disabled = true;

    try {
      if (mode === 'login') {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          throw error;
        }
        messageDiv.style.color = '#7cff7c';
        messageDiv.textContent = 'Login berhasil! Memuat...';

        // Redirect ke halaman utama (games)
        setTimeout(() => {
          window.location.href = 'games.html';
        }, 1200);

      } else {
        // Register mode
        // Daftarkan user di Supabase auth
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) {
          throw error;
        }
        messageDiv.style.color = '#7cff7c';
        messageDiv.textContent = 'Pendaftaran berhasil! Cek email Anda untuk verifikasi.';

        // Simpan data user di tabel users untuk saldo awal
        if (data.user) {
          const userId = data.user.id;
          // Cek apakah user sudah ada
          const { data: existingUser, error: errUser } = await supabase
            .from('users')
            .select('id')
            .eq('id', userId)
            .single();

          if (!existingUser) {
            await supabase.from('users').insert([{
              id: userId,
              username: email.split('@')[0],
              email: email,
              donuts_balance: 100
            }]);
          }
        }
      }
    } catch (err) {
      messageDiv.style.color = '#ff6666';
      messageDiv.textContent = err.message || 'Terjadi kesalahan';
    } finally {
      submitBtn.disabled = false;
    }
  };
</script>

</body>
</html>
